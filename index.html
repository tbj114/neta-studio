<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nieta Studio">
  <meta name="theme-color" content="#1A1A1A">
  <title>Nieta Studio</title>
  <link rel="icon" href="https://oss.talesofai.cn/static/talesofai-h5/favicon.ico" type="image/png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <!-- 顶部栏 -->
    <header class="mobile-header" id="mobile-header">
      <div class="mobile-header-left">
        <div class="mobile-logo">N</div>
      </div>
      <div class="mobile-header-center">
        <span class="mobile-header-title" id="mobile-header-title">创作</span>
      </div>
      <div class="mobile-header-right">
        <div class="ap-display-mobile" id="ap-display-mobile">
          <svg class="ap-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          <span id="ap-value-mobile">--</span>
        </div>
        <button class="mobile-header-btn" id="token-btn-mobile" title="设置 Token">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        </button>
      </div>
    </header>

    <!-- 页面容器 -->
    <div class="page-container-mobile" id="page-container"></div>

    <!-- 底部 Tab 导航 -->
    <nav class="mobile-tab-bar" id="mobile-tab-bar">
      <button class="mobile-tab active" data-route="generate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>创作</span>
      </button>
      <button class="mobile-tab" data-route="works">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>作品</span>
      </button>
      <button class="mobile-tab" data-route="feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 11a9 9 0 019 9M4 4a16 16 0 0116 16"/><circle cx="5" cy="19" r="1" fill="currentColor"/></svg>
        <span>发现</span>
      </button>
    </nav>
  </div>

  <!-- Token 设置面板 -->
  <div class="token-panel-overlay" id="token-panel-overlay"></div>
  <div class="token-panel" id="token-panel">
    <div class="token-panel-header">
      <h3>🔑 API Token</h3>
      <button class="btn btn-icon btn-ghost" id="token-panel-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="token-panel-body">
      <div class="form-group">
        <label class="form-label">X-Token</label>
        <input type="text" class="form-input" id="token-input" placeholder="粘贴你的 x-token..." autocomplete="off">
        <span class="text-xs text-tertiary mt-sm" style="display:block">从浏览器开发者工具中获取请求头中的 x-token 值</span>
      </div>
      <div class="form-group">
        <label class="form-label">API 地址</label>
        <input type="text" class="form-input" id="api-url-input" value="https://api.talesofai.cn" placeholder="API 基础地址">
      </div>
      <div class="form-group">
        <label class="form-label">连接状态</label>
        <div id="token-status" class="flex items-center gap-sm">
          <span class="text-sm text-tertiary">未设置 Token</span>
        </div>
      </div>
      <div style="margin-top:auto;display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary btn-lg w-full" id="token-save-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
          保存 Token
        </button>
        <button class="btn btn-secondary w-full" id="token-test-btn">测试连接</button>
        <button class="btn btn-ghost w-full text-sm text-tertiary" id="token-clear-btn">清除 Token</button>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/components.js?v=2"></script>
  <script src="js/pages/generate.js?v=2"></script>
  <script src="js/pages/works.js?v=2"></script>
  <script src="js/pages/feed.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
